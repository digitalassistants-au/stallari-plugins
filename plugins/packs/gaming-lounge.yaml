pack: "1.6"
name: gaming-lounge
title: "Gaming Lounge"
featured: true
version: "1.0.0"
tagline: "PlayStation, Xbox, and Steam in one conversation — friends, trophies, and game night coordination"
description: >-
  Cross-platform gaming presence — friends online, achievement progress, game
  libraries, and session coordination across PlayStation, Xbox, and Steam.
  Three platforms, one agent, zero tab-switching.
icon: /icons/gaming-lounge.svg
author:
  name: Stallari
  url: https://stallari.ai
licence: Proprietary
visibility: open
tier: certified
author_type: first-party
readiness: beta
pricing: null
bundled: false

readme:
  format: markdown
  body: |
    # Gaming Lounge

    Cross-platform gaming presence for Stallari — PlayStation, Xbox, and Steam
    unified in one conversation. See who's online across all platforms, compare
    achievements, browse game libraries, and coordinate game night without
    switching between three apps.

    ## What it does

    Stop checking three apps to find out who's online. The Gaming Lounge gives
    your agent visibility across PlayStation Network, Xbox Live, and Steam
    simultaneously. One question — "who's online?" — returns friends from all
    three platforms.

    ## Platform coverage

    | Platform | Contract | Certified plugin | Community |
    |----------|----------|-----------------|-----------|
    | PlayStation | `gaming-v1` | PSN Blade (16 tools) | — |
    | Xbox | `gaming-v1` | Xbox Live Blade (22 tools) | Xbox OpenXBL (6 tools) |
    | Steam | `gaming-v1` | Steam Blade (12 tools) | — |

    ## What the contract gives you

    Every gaming plugin implements the same `gaming-v1` contract, so skills
    work identically across platforms:

    | Operation | PSN | Xbox | Steam |
    |-----------|-----|------|-------|
    | Profile | ✓ | ✓ | ✓ |
    | Achievements/Trophies | ✓ | ✓ | ✓ |
    | Game library | ✓ | ✓ | ✓ |
    | Friends + presence | ✓ | ✓ | ✓ |
    | Game search | ✓ | ✓ | ✓ |
    | Messaging | ✓ (gated) | ✓ (gated) | ✗ (deprecated) |
    | SmartGlass/console | ✗ | ✓ (gated) | ✗ |

    Install only the platforms you use. The pack degrades gracefully — if you
    only have Steam and PSN, Xbox skills are simply skipped.

    ## Skills overview

    ### Social
    - **whos-online** — Cross-platform friends check: who's online, what are they playing?
    - **game-night** — Coordinate a session: find a game everyone owns, check who's free

    ### Collection
    - **trophy-hunt** — Achievement progress across all platforms, rare trophy finder
    - **library-census** — Complete game inventory with play time stats

    ### Discovery
    - **game-scout** — Search across all platform catalogs, compare prices and player counts

    ## Safety model

    This pack is **read-only**. It never sends messages, adds friends, or
    controls consoles. If you want those capabilities, use the individual
    plugins directly with write mode enabled.

highlights:

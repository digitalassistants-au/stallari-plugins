readme:
  format: markdown
  body: |
    # Network Observatory

    Full-stack network visibility for Stallari — from LEO satellite downlink to
    ISP handoff to local routing to overlay mesh to DNS privacy. Every layer of
    your network, observable and diagnosable from a single conversation.

    ## What it does

    This pack treats your entire network stack as one observable system. Instead
    of logging into five dashboards (ISP portal, DNS filtering console, UniFi
    controller, Tailscale admin, Starlink app), you ask your agent.

    ## Layer model

    | Layer | Service | Contract | What you see |
    |-------|---------|----------|-------------|
    | **WAN** | ISP account | `isp-v1` | Usage, outages, billing, line diagnostics |
    | **DNS** | DNS filtering | `dns-v1` | Profiles, filters, rules, blocked services |
    | **LAN** | Network infra | `network-v1` | Devices, clients, firewall, traffic rules |
    | **Overlay** | VPN/mesh | `overlay-network-v1` | Devices, ACLs, keys, routes, audit |
    | **Uplink** | LEO terminal | `leo-modem-v1` | Signal, obstruction, alerts, throughput |

    ## Plugin marketplace

    This pack declares abstract services — you bring the concrete plugins for
    your hardware and providers. Install them from the Stallari marketplace:

    | Service | Certified plugin | Community alternatives |
    |---------|------------------|-----------------------|
    | ISP | Aussie Broadband | _(contribute yours!)_ |
    | DNS | Control-D | AdGuard Home |
    | Network | Ubiquiti UniFi | UniFi Full Management |
    | Overlay | Tailscale | Tailscale Full Management |
    | LEO modem | Starlink Dish | Starlink Enterprise |

    Install only the layers you have. The pack degrades gracefully — if you
    don't have a Starlink dish, the LEO layer is simply skipped. ISP and DNS
    are required; everything else is optional.

    ## Skills overview

    ### Observability
    - **stack-health** — One-command health check across every configured layer
    - **network-census** — Full device and endpoint inventory across all layers

    ### Diagnosis
    - **connectivity-triage** — Layer-by-layer diagnosis when something breaks
    - **dns-security-audit** — DNS filtering coverage, firewall policies, overlay ACLs

    ### Reporting
    - **morning-network-brief** — Quick daily status: ISP usage, outages, device counts, overlay health

    ## Why this pack

    - **Five service contracts** spanning the full network stack
    - **Graceful degradation** — install only the layers you have
    - **Cross-layer correlation** — ISP outage + Starlink failover + overlay reroute, understood together
    - **Plugin choice** — swap providers without changing skills (Aussie BB → any ISP plugin)
    - **Read-heavy, write-gated** — monitoring by default, mutations only with confirmation

highlights:

# ── Plugin suggestions ──────────────────────────────────────────────
# Maps abstract services to concrete MCP plugins available in the
# marketplace. The harness uses this to guide users through plugin
# installation when a required or recommended service has no provider
# configured. Each entry specifies the service, lists candidate plugins
# with their marketplace name, and optionally notes install constraints.

suggested_plugins:
  - service: isp
    required: true
    note: "Install one plugin per ISP account. Multi-instance supported."
    plugins:
      - name: aussiebb-blade-mcp
        title: "Aussie Broadband"
        author_type: first-party
        note: "Australian NBN provider (Aussie Broadband accounts)"
      # Future: other ISP blades (e.g. superloop-blade-mcp, belong-blade-mcp)

  - service: dns
    required: true
    note: "Install one DNS filtering plugin. Self-hosted or cloud."
    plugins:
      - name: controld-blade-mcp
        title: "Control-D"
        author_type: first-party
        note: "Cloud DNS filtering and privacy service"
      - name: adguard-home-mcp
        title: "AdGuard Home"
        author_type: community
        note: "Self-hosted DNS filtering (65 tools, full management)"

  - service: network
    required: false
    note: "Install if you have managed network hardware (switches, APs, gateways)."
    plugins:
      - name: ubiquiti-unifi-blade-mcp
        title: "Ubiquiti UniFi"
        author_type: first-party
        note: "Monitoring-focused (18 tools, token-efficient)"
      - name: unifi-mcp
        title: "UniFi Full Management"
        author_type: community
        note: "Full config management (161 tools, write-heavy)"

  - service: overlay-network
    required: false
    note: "Install if you run a VPN or overlay mesh."
    plugins:
      - name: tailscale-blade-mcp
        title: "Tailscale"
        author_type: first-party
        note: "Monitoring and security audit (17 tools)"
      - name: hexsleeves-tailscale-mcp
        title: "Tailscale Full Management"
        author_type: community
        note: "Full management including ACL editing"

  - service: leo-modem
    required: false
    note: "Install if you have a Starlink dish or LEO terminal on the local network."
    plugins:
      - name: starlink-blade-mcp
        title: "Starlink Dish"
        author_type: first-party
        note: "Local gRPC — no cloud, no credentials, residential dish"
      - name: starlink-enterprise-mcp
        title: "Starlink Enterprise"
        author_type: community
        note: "Cloud API for enterprise fleet management"


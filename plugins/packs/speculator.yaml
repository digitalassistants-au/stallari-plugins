readme:
  format: markdown
  body: |
    # Speculator

    Cross-market pricing intelligence for Stallari — betting exchanges,
    prediction markets, and securities brokerage unified in one conversation.
    The same event priced three different ways, compared in seconds.

    ## What it does

    Markets disagree. An election has odds on Betfair, a price on Polymarket,
    and options pricing on IB. A sporting event has exchange odds on Betfair
    and correlated futures on IB. This pack lets your agent see all three
    price sources simultaneously and flag when they diverge.

    ## Market stack

    | Layer | Service | Contract | What you see |
    |-------|---------|----------|-------------|
    | **Exchange** | Betting exchange | `betting-exchange-v1` | Sports/event odds, market books, P&L, settlements |
    | **Prediction** | Prediction market | `prediction-market-v1` | Binary outcomes, orderbooks, analytics, leaderboards |
    | **Securities** | Brokerage | `brokerage-v1` | Portfolio, quotes, historical data, scanners |

    ## Plugin marketplace

    | Service | Certified plugin | Community alternatives |
    |---------|------------------|-----------------------|
    | Exchange | Betfair Exchange (22 tools) | — |
    | Prediction | Polymarket (22 tools) | Prediction Markets (Polymarket + Kalshi) |
    | Securities | Interactive Brokers (21 tools) | — |

    Prediction market is required (zero-config, no auth needed). Exchange and
    brokerage are recommended — they unlock cross-market correlation.

    ## Skills overview

    ### Analysis
    - **market-scan** — Cross-market event search: same event, three price sources
    - **price-check** — Implied probability comparison across all configured markets

    ### Portfolio
    - **exposure-report** — Open positions and P&L across all three market types
    - **settlement-review** — Cleared bets, resolved predictions, recent trades

    ### Discovery
    - **morning-markets** — Daily market brief: trending predictions, live events, portfolio moves

    ## Safety model

    This pack is **strictly read-only**. It never places orders, bets, or
    trades. The Speculator observes and analyses — execution requires the
    individual plugins with write mode enabled.

    Real money is at stake across all three services. The read-only constraint
    is non-negotiable for the pack. If you need to trade, use the plugins
    directly.


readme:
  format: markdown
  body: |
    # SaaS Revenue Ops

    End-to-end revenue operations for Stallari — subscription billing, storefront
    management, and transactional email delivery unified in one conversation. Stop
    switching between Paddle, Shopify, and Resend dashboards.

    ## What it does

    This pack treats your revenue stack as one observable pipeline. A customer
    subscribes (Paddle), orders a product (Shopify), and receives a confirmation
    email (Resend). Your agent can trace that entire flow, diagnose where it
    broke, and report on the health of each layer.

    ## Revenue stack

    | Layer | Service | Contract | What you see |
    |-------|---------|----------|-------------|
    | **Billing** | Subscriptions | `billing-v1` | Products, prices, subscriptions, transactions, MRR |
    | **Commerce** | Storefront | `ecommerce-v1` | Products, orders, customers, inventory, fulfillment |
    | **Delivery** | Email | `transactional-email-v1` | Sends, delivery status, domains, contacts, broadcasts |

    ## Plugin marketplace

    | Service | Certified plugin | What it covers |
    |---------|-----------------|----------------|
    | Billing | Paddle Billing | Products, prices, subscriptions, transactions, webhooks |
    | Commerce | Shopify | Products, orders, customers, inventory, discounts, analytics |
    | Delivery | Resend | Send, contacts, broadcasts, templates, domains, webhooks |

    Billing is required. Commerce and delivery are recommended — the pack
    degrades gracefully without them, but the cross-layer skills lose
    correlation capability.

    ## Skills overview

    ### Observability
    - **revenue-pulse** — Daily revenue snapshot: MRR, new subscriptions, churn, orders, delivery health
    - **pipeline-health** — End-to-end pipeline audit: billing → commerce → delivery status

    ### Investigation
    - **customer-lookup** — Unified customer view: subscriptions, orders, emails, payment history
    - **churn-triage** — Investigate cancelled/past-due subscriptions with transaction and email context

    ### Reporting
    - **morning-revenue-brief** — Scheduled daily brief: key metrics, failures, and action items

    ## Safety model

    This pack is **read-only by default**. It never creates subscriptions,
    processes refunds, fulfills orders, or sends emails. The agent monitors
    and diagnoses — write operations require the individual plugins with
    write mode enabled.


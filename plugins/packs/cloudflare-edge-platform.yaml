data:
  reads: [vault, edge-platform]
  writes: [vault, edge-platform]
  stores: nothing
  phones_home: false

agents:
  infra-operator:
    role: operator
    prompt: |
      You are an infrastructure operator for the Sidereal edge platform pack. You
      manage the full Cloudflare stack: DNS records, Tunnels, Workers, Pages, KV
      namespaces, D1 databases, R2 buckets, and cache invalidation.

      Your domain is the Cloudflare edge — the infrastructure layer that makes
      Sidereal services reachable, fast, and resilient. You treat Cloudflare as
      managed infrastructure: read freely, write only with human confirmation on
      all mutations.

      Safety rules:
      - Never delete DNS records, tunnels, Worker secrets, or R2 buckets without
        explicit human approval.
      - Always present the full proposed configuration change for review before
        applying writes.
      - Every infrastructure change must be documented in a vault service record
        at atlas/registers/infrastructure/.
      - Worker secret values are never logged, displayed, or stored — only names.
      - Cache purge operations are destructive and irreversible — confirm scope
        before executing.

      Write structured reports to atlas/registers/infrastructure/.

skills:
  # ── Tunnel lifecycle ──────────────────────────────────────────────

  - name: tunnel-serve
    agent: infra-operator
    description: Expose a local service via Cloudflare Tunnel — the turnkey alternative to Tailscale Serve
    tier: reasoning
    category: transform
    graph: react-extract
    services_used:
      - service: edge-platform
        operations: [tunnel_list, tunnel_get, tunnel_list_configs, tunnel_update_config, dns_list_zones, dns_list_records, dns_create_record]
      - service: vault
        operations: [read, create]
    inputs:
      - key: hostname
        type: string
        label: Public hostname
        description: "The public hostname to expose (e.g. api.example.com)"
        required: true
      - key: origin
        type: string
        label: Local origin
        description: "The local service URL to proxy to (e.g. http://localhost:9847)"
        required: true
      - key: tunnel_name
        type: string
        label: Tunnel name
        description: "Name of the Cloudflare Tunnel to use (uses default if omitted)"
        required: false
    trigger:
      on_demand: true
    prompt: |
      Expose a local service through a Cloudflare Tunnel — the equivalent of
      `tailscale serve` but via Cloudflare's edge network with automatic HTTPS,
      DDoS protection, and global anycast.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. List tunnels via {{edge-platform.tunnel_list}} and identify the target
           tunnel (by config.tunnel_name input, or the first active tunnel).
        2. Read current ingress config via {{edge-platform.tunnel_list_configs}}.
        3. Verify the requested hostname (config.hostname) does not already have
           an ingress rule. If it does, show the existing rule and ask whether to
           replace it.
        4. Look up the DNS zone for the hostname's domain via
           {{edge-platform.dns_list_zones}}.
        5. Check if a CNAME record already exists for the hostname pointing to
           the tunnel's .cfargotunnel.com address. If not, create it via
           {{edge-platform.dns_create_record}} (proxied CNAME).
        6. Build the new ingress config: insert the new rule (hostname →
           config.origin) before the catch-all rule. Present the full proposed
           config to the human for review.
        7. On approval, apply via {{edge-platform.tunnel_update_config}}.
        8. Verify the tunnel shows active connections via
           {{edge-platform.tunnel_list_connections}}.

      Write a service record to
      atlas/registers/infrastructure/tunnel-serve-{hostname-slug}.md with:
        - Tunnel name and ID
        - Hostname → origin mapping
        - DNS record created (if any)
        - Timestamp of provisioning

      Present a summary: "hostname is now reachable at https://{hostname},
      proxying to {origin} via tunnel {tunnel_name}."

  - name: tunnel-funnel
    agent: infra-operator
    description: Create a public-facing Cloudflare Tunnel endpoint with DNS — the turnkey alternative to Tailscale Funnel
    tier: reasoning
    category: transform
    graph: react-extract
    services_used:
      - service: edge-platform
        operations: [tunnel_list, tunnel_get, tunnel_create, tunnel_list_configs, tunnel_update_config, dns_list_zones, dns_list_records, dns_create_record]
      - service: vault
        operations: [read, create]
    inputs:
      - key: hostname
        type: string
        label: Public hostname
        description: "The public hostname to expose (e.g. hooks.example.com)"
        required: true
      - key: origin
        type: string
        label: Local origin
        description: "The local service URL to proxy to (e.g. http://localhost:9848)"
        required: true
      - key: tunnel_name
        type: string
        label: Tunnel name
        description: "Create or use a named tunnel (auto-generated if omitted)"
        required: false
      - key: access_policy
        type: choice
        label: Access policy
        description: "Who can reach this endpoint"
        choices: [public, tailnet-only]
        default: public
        required: false
    trigger:
      on_demand: true
    prompt: |
      Create a publicly reachable endpoint via Cloudflare Tunnel — the equivalent
      of `tailscale funnel` but with Cloudflare's global edge network, WAF, and
      bot management. Unlike tunnel-serve (which uses an existing tunnel),
      tunnel-funnel provisions a dedicated tunnel for internet-facing services
      like webhook receivers and public APIs.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. Check if config.tunnel_name matches an existing tunnel via
           {{edge-platform.tunnel_list}}.
        2. If no matching tunnel exists, create one via
           {{edge-platform.tunnel_create}} with a generated secret. Store the
           tunnel secret reference (never log the secret itself).
        3. Read current ingress config (if tunnel existed) via
           {{edge-platform.tunnel_list_configs}}.
        4. Look up the DNS zone for the hostname's domain via
           {{edge-platform.dns_list_zones}}.
        5. Create a proxied CNAME record (hostname → tunnel UUID.cfargotunnel.com)
           via {{edge-platform.dns_create_record}} if one does not exist.
        6. Build the ingress config: hostname → config.origin, plus catch-all
           returning 404. Present the full config for human review.
        7. On approval, apply via {{edge-platform.tunnel_update_config}}.
        8. Verify connectivity via {{edge-platform.tunnel_list_connections}}.

      If config.access_policy is "tailnet-only", note in the service record
      that the operator should configure Cloudflare Access policies manually
      (this pack does not manage Access — only Tunnel + DNS).

      Write a service record to
      atlas/registers/infrastructure/tunnel-funnel-{hostname-slug}.md with:
        - Tunnel name, ID, and creation status (new/existing)
        - Hostname → origin mapping
        - DNS record details
        - Access policy note
        - Timestamp

      Present a summary: "Public endpoint live at https://{hostname},
      proxying to {origin}. Tunnel: {tunnel_name}."

  # ── Auditing and inventory ────────────────────────────────────────

  - name: tunnel-health
    agent: infra-operator
    description: Monitor Cloudflare Tunnel connectivity and ingress configuration health
    tier: reasoning
    category: review
    graph: react
    services_used:
      - service: edge-platform
        operations: [tunnel_list, tunnel_get, tunnel_list_configs, tunnel_list_connections, dns_list_records]
      - service: vault
        operations: [read, search, create]
    trigger:
      on_demand: true
    prompt: |
      Audit the health of all Cloudflare Tunnels and their ingress configurations.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. List all tunnels via {{edge-platform.tunnel_list}}.
        2. For each tunnel:
           a. Get tunnel details and status via {{edge-platform.tunnel_get}}.
           b. List active connections via {{edge-platform.tunnel_list_connections}}.
           c. Read ingress config via {{edge-platform.tunnel_list_configs}}.
        3. For each ingress hostname, verify the corresponding DNS record exists
           and points to the correct tunnel via {{edge-platform.dns_list_records}}.
        4. Cross-reference with vault service records in
           atlas/registers/infrastructure/tunnel-*.md — flag any stale records
           (tunnel deleted but record remains, or vice versa).

      Classify each tunnel as:
        - healthy: active connections, DNS aligned, ingress rules valid
        - degraded: tunnel exists but no active connections, or DNS mismatch
        - orphaned: DNS record exists but tunnel is deleted
        - undocumented: tunnel active but no vault service record

      Write the health report to
      atlas/registers/infrastructure/tunnel-health-{date}.md with a summary
      table and per-tunnel detail sections.

  - name: dns-audit
    agent: infra-operator
    description: Audit DNS records across all zones — find orphans, misconfigurations, and missing records
    tier: reasoning
    category: review
    graph: react
    services_used:
      - service: edge-platform
        operations: [dns_list_zones, dns_list_records, dns_get_record, dns_export_records]
      - service: vault
        operations: [read, search, create]
    trigger:
      on_demand: true
    prompt: |
      Audit DNS records across all Cloudflare zones for hygiene and correctness.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. List all zones via {{edge-platform.dns_list_zones}}.
        2. For each zone, list all records via {{edge-platform.dns_list_records}}.
        3. Classify each record:
           - Tunnel CNAMEs: verify the referenced tunnel still exists.
           - A/AAAA records: flag any pointing to private IP ranges
             (10.x, 172.16-31.x, 192.168.x) — these are likely stale.
           - MX records: verify consistency (no orphaned MX without matching
             SPF/DKIM TXT records).
           - TXT records: flag any that look like abandoned verification tokens.
           - Proxied vs unproxied: flag unproxied A/AAAA records that could
             benefit from Cloudflare's CDN.
        4. Export each zone in BIND format via {{edge-platform.dns_export_records}}
           for backup.
        5. Search vault for infrastructure notes that reference DNS records —
           flag records with no vault documentation.

      Write the audit to atlas/registers/infrastructure/dns-audit-{date}.md with:
        - Per-zone summary (record count by type, issues found)
        - Issue table (record, type, issue, severity, recommendation)
        - Backup confirmation (BIND export paths)

  - name: kv-inventory
    agent: infra-operator
    description: Inventory Workers KV namespaces with key counts and usage patterns
    tier: reasoning
    category: report
    graph: react
    services_used:
      - service: edge-platform
        operations: [kv_list_namespaces, kv_list_keys]
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    prompt: |
      Inventory all Workers KV namespaces and their contents.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. List all KV namespaces via {{edge-platform.kv_list_namespaces}}.
        2. For each namespace, list keys via {{edge-platform.kv_list_keys}}
           to get a count and sample key prefixes (first page only — do not
           paginate exhaustively for large namespaces).
        3. Classify namespaces by apparent purpose based on name and key
           patterns (e.g. session store, cache, config, feature flags).
        4. Flag namespaces with zero keys (candidates for cleanup) or
           namespaces not referenced by any known Worker.

      Write the inventory to
      atlas/registers/infrastructure/kv-inventory-{date}.md with a summary
      table (namespace, key count, classification, notes).

  - name: d1-inventory
    agent: infra-operator
    description: Inventory D1 databases with schema snapshots and size tracking
    tier: reasoning
    category: report
    graph: react
    services_used:
      - service: edge-platform
        operations: [d1_list_databases, d1_get_database, d1_list_tables, d1_describe_table]
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    prompt: |
      Inventory all D1 databases with schema snapshots.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. List all databases via {{edge-platform.d1_list_databases}}.
        2. For each database:
           a. Get details via {{edge-platform.d1_get_database}} (size, table count).
           b. List tables via {{edge-platform.d1_list_tables}} with row counts.
           c. For each table, describe schema via {{edge-platform.d1_describe_table}}.
        3. Compare against previous inventory in
           atlas/registers/infrastructure/d1-inventory-*.md if available.
           Flag schema changes (new tables, dropped columns, type changes) and
           significant size growth.

      Write the inventory to
      atlas/registers/infrastructure/d1-inventory-{date}.md with:
        - Database summary table (name, tables, size, row total)
        - Per-database schema snapshot (table, columns, types, PKs)
        - Drift notes vs previous inventory

  - name: workers-audit
    agent: infra-operator
    description: Audit Worker scripts — deployments, version routing, secrets, cron schedules
    tier: reasoning
    category: review
    graph: react
    services_used:
      - service: edge-platform
        operations: [workers_list_scripts, workers_get_script, workers_list_deployments, workers_list_versions, workers_list_secrets, workers_get_schedules]
      - service: vault
        operations: [read, search, create]
    trigger:
      on_demand: true
    prompt: |
      Audit all Workers scripts for deployment health, secret hygiene, and
      schedule correctness.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. List all scripts via {{edge-platform.workers_list_scripts}}.
        2. For each script:
           a. Get script metadata via {{edge-platform.workers_get_script}} —
              note compatibility date, usage model, placement, and last deployed.
           b. List deployments via {{edge-platform.workers_list_deployments}} —
              check version routing percentages and strategy.
           c. List versions via {{edge-platform.workers_list_versions}} —
              identify how many versions exist and which are deployed.
           d. List secret names via {{edge-platform.workers_list_secrets}} —
              flag any scripts with zero secrets that likely need configuration.
           e. Get cron schedules via {{edge-platform.workers_get_schedules}} —
              flag scripts with no schedules that are cron-driven by convention.
        3. Cross-reference with vault infrastructure records and known Workers
           (e.g. sidereal-registry, sidereal-events-infra). Flag undocumented
           scripts.

      Classify each Worker as:
        - healthy: deployed, secrets configured, schedules set (if needed)
        - stale: not deployed in >90 days, or outdated compatibility date
        - unconfigured: missing expected secrets or schedules
        - orphaned: no routes, no schedules, no recent deployments

      Write the audit to
      atlas/registers/infrastructure/workers-audit-{date}.md with:
        - Script summary table (name, status, version count, last deployed)
        - Per-script detail (deployment routing, secrets count, schedules)
        - Issues and recommendations

  - name: pages-audit
    agent: infra-operator
    description: Audit Pages projects — deployments, custom domains, build health
    tier: reasoning
    category: review
    graph: react
    services_used:
      - service: edge-platform
        operations: [pages_list_projects, pages_get_project, pages_list_deployments, pages_list_domains]
      - service: vault
        operations: [read, search, create]
    trigger:
      on_demand: true
    prompt: |
      Audit all Cloudflare Pages projects for deployment health and domain
      configuration.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. List all projects via {{edge-platform.pages_list_projects}}.
        2. For each project:
           a. Get project details via {{edge-platform.pages_get_project}} —
              note source config, build settings, latest deployment.
           b. List recent deployments via {{edge-platform.pages_list_deployments}}
              — check for failed builds, deployment frequency, environment split.
           c. List custom domains via {{edge-platform.pages_list_domains}} —
              verify all domains are active and SSL is valid.
        3. Cross-reference with vault records and known Pages sites
           (e.g. marketplace.sidereal.cc, sidereal.cc). Flag undocumented projects.

      Classify each project as:
        - healthy: recent successful deployment, domains active
        - stale: no deployment in >30 days
        - failing: last deployment failed
        - unconfigured: no custom domain, or domain with SSL issues

      Write the audit to
      atlas/registers/infrastructure/pages-audit-{date}.md with:
        - Project summary table (name, status, last deploy, domain count)
        - Per-project detail (latest deployment, build config, domains)
        - Issues and recommendations

  - name: r2-audit
    agent: infra-operator
    description: Inventory R2 buckets with location and storage class
    tier: reasoning
    category: report
    graph: react
    services_used:
      - service: edge-platform
        operations: [r2_list_buckets, r2_get_bucket]
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    prompt: |
      Inventory all R2 buckets.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. List all buckets via {{edge-platform.r2_list_buckets}}.
        2. For each bucket, get details via {{edge-platform.r2_get_bucket}} —
           note location, storage class, and creation date.
        3. Cross-reference with known R2 usage (e.g. sidereal-registry bucket
           for catalog storage). Flag buckets with no known purpose.
        4. Compare against previous inventory if available.

      Write the inventory to
      atlas/registers/infrastructure/r2-inventory-{date}.md with:
        - Bucket summary table (name, location, storage class, created)
        - Known purpose mapping
        - Flagged items (unknown purpose, naming anomalies)

  # ── Deployment and operations ─────────────────────────────────────

  - name: workers-deploy
    agent: infra-operator
    description: Deploy a Worker version with percentage-based traffic routing
    tier: reasoning
    category: transform
    graph: react-extract
    services_used:
      - service: edge-platform
        operations: [workers_get_script, workers_list_versions, workers_list_deployments, workers_create_deployment]
      - service: vault
        operations: [read, create]
    inputs:
      - key: script_name
        type: string
        label: Worker script name
        description: "Name of the Worker script to deploy"
        required: true
      - key: version_id
        type: string
        label: Version ID
        description: "Version to deploy (omit for latest)"
        required: false
      - key: percentage
        type: number
        label: Traffic percentage
        description: "Percentage of traffic to route to the new version (100 = full deploy)"
        default: 100
    trigger:
      on_demand: true
    prompt: |
      Deploy a Worker version with controlled traffic routing.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. Get current script state via {{edge-platform.workers_get_script}}
           for config.script_name. Note current deployment and compatibility date.
        2. If config.version_id is omitted, list versions via
           {{edge-platform.workers_list_versions}} and use the latest.
        3. List current deployments via {{edge-platform.workers_list_deployments}}
           to understand existing routing.
        4. Present the deployment plan:
           - Script: {script_name}
           - Version: {version_id} (→ {percentage}% traffic)
           - Previous version: retains remaining traffic if percentage < 100
        5. On approval, create deployment via
           {{edge-platform.workers_create_deployment}} with version routing.
        6. Verify deployment succeeded by re-reading deployments.

      Write a deployment record to
      atlas/registers/infrastructure/worker-deploy-{script_name}-{date}.md.

      Present summary: "{script_name} deployed version {version_id} at
      {percentage}% traffic."

  - name: pages-rollback
    agent: infra-operator
    description: Roll back a Pages project to a previous deployment
    tier: reasoning
    category: transform
    graph: react-extract
    services_used:
      - service: edge-platform
        operations: [pages_get_project, pages_list_deployments, pages_get_deployment, pages_rollback]
      - service: vault
        operations: [read, create]
    inputs:
      - key: project_name
        type: string
        label: Pages project name
        description: "Name of the Pages project to roll back"
        required: true
      - key: deployment_id
        type: string
        label: Target deployment ID
        description: "Deployment to roll back to (omit to use second-most-recent)"
        required: false
    trigger:
      on_demand: true
    prompt: |
      Roll back a Cloudflare Pages project to a previous deployment. This is
      a destructive operation — the current production deployment is replaced.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. Get project details via {{edge-platform.pages_get_project}} for
           config.project_name. Note the current production deployment.
        2. List recent deployments via {{edge-platform.pages_list_deployments}}
           filtered to production environment.
        3. If config.deployment_id is omitted, select the second-most-recent
           successful production deployment.
        4. Get target deployment details via
           {{edge-platform.pages_get_deployment}} — show commit, build time,
           and age.
        5. Present the rollback plan:
           - Project: {project_name}
           - Current: deployment {current_id} ({current_date})
           - Rolling back to: deployment {target_id} ({target_date})
           - Warning: this replaces the current production deployment
        6. On explicit approval, execute via {{edge-platform.pages_rollback}}.
        7. Verify rollback by re-reading project details.

      Write a rollback record to
      atlas/registers/infrastructure/pages-rollback-{project_name}-{date}.md.

      Present summary: "{project_name} rolled back from {current_id} to
      {target_id}."

  - name: cache-purge
    agent: infra-operator
    description: Targeted cache invalidation by URL, tag, host, or prefix
    tier: reasoning
    category: transform
    graph: react-extract
    services_used:
      - service: edge-platform
        operations: [dns_list_zones, cache_purge]
      - service: vault
        operations: [read, create]
    inputs:
      - key: zone
        type: string
        label: DNS zone
        description: "Domain to purge cache for (e.g. sidereal.cc)"
        required: true
      - key: purge_type
        type: choice
        label: Purge type
        description: "How to target the purge"
        choices: [urls, tags, hosts, prefixes, everything]
        default: urls
      - key: targets
        type: string
        label: Targets
        description: "Comma-separated URLs, tags, hosts, or prefixes to purge (ignored for 'everything')"
        required: false
    trigger:
      on_demand: true
    prompt: |
      Purge Cloudflare cache for a zone. This is destructive and irreversible —
      purged content must be re-fetched from origin.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. Resolve the zone ID via {{edge-platform.dns_list_zones}} for
           config.zone.
        2. Parse config.targets (comma-separated) into a list.
        3. Present the purge plan:
           - Zone: {zone}
           - Type: {purge_type}
           - Targets: {list or "EVERYTHING — all cached content"}
           - Warning for "everything": this will cause a traffic spike to origin
        4. On explicit approval, execute via {{edge-platform.cache_purge}}
           with the appropriate parameter (files, tags, hosts, prefixes, or
           purge_everything: true).
        5. Report the purge response.

      Write a purge record to
      atlas/registers/infrastructure/cache-purge-{zone}-{date}.md.

      Present summary: "Purged {count} {purge_type} from {zone} cache."

  # ── Full lifecycle ────────────────────────────────────────────────

  - name: edge-provision
    agent: infra-operator
    description: Provision a complete edge stack — tunnel + DNS + optional KV/D1/R2 for a new service
    tier: reasoning
    category: transform
    graph: plan-execute
    graph_config:
      max_replan_attempts: 2
    services_used:
      - service: edge-platform
        operations: [tunnel_list, tunnel_create, tunnel_update_config, dns_list_zones, dns_create_record, kv_list_namespaces, kv_put, d1_list_databases, d1_execute, r2_list_buckets, r2_create_bucket]
      - service: vault
        operations: [read, create]
    inputs:
      - key: service_name
        type: string
        label: Service name
        description: "Name for the new service (used as prefix for all resources)"
        required: true
      - key: hostname
        type: string
        label: Public hostname
        description: "Public hostname for the service"
        required: true
      - key: origin
        type: string
        label: Local origin
        description: "Local service URL"
        required: true
      - key: with_kv
        type: boolean
        label: Provision KV namespace
        default: false
      - key: with_d1
        type: boolean
        label: Provision D1 database
        default: false
      - key: with_r2
        type: boolean
        label: Provision R2 bucket
        default: false
    trigger:
      on_demand: true
    prompt: |
      Provision a complete Cloudflare edge stack for a new service. This is the
      one-command setup that creates everything a service needs to be publicly
      reachable with optional storage backends.

      Generate timestamps via agentic-timestamp --iso --date.

      Present a provisioning plan to the human before executing anything:

        Service: {config.service_name}
        Hostname: https://{config.hostname}
        Origin: {config.origin}
        Resources:
          - Tunnel: {service_name}-tunnel (new or existing)
          - DNS: CNAME {hostname} → tunnel
          - KV: {service_name}-kv (if config.with_kv)
          - D1: {service_name}-db (if config.with_d1)
          - R2: {service_name}-bucket (if config.with_r2)

      On approval, execute in order:
        1. Create tunnel (if needed) via {{edge-platform.tunnel_create}}.
        2. Configure ingress via {{edge-platform.tunnel_update_config}}.
        3. Create DNS CNAME via {{edge-platform.dns_create_record}}.
        4. If config.with_kv: note that KV namespace creation requires the
           Cloudflare dashboard — document the manual step.
        5. If config.with_d1: note that D1 database creation requires wrangler
           CLI — document the manual step.
        6. If config.with_r2: create bucket via {{edge-platform.r2_create_bucket}}.

      Write a comprehensive service record to
      atlas/registers/infrastructure/edge-service-{service_name}.md with all
      resource IDs, configuration details, and any manual steps remaining.

      Present a completion summary with the provisioned resources and any
      manual follow-up actions.

  - name: edge-teardown
    agent: infra-operator
    description: Decommission an edge service — remove tunnel ingress, DNS records, and archive documentation
    tier: reasoning
    category: transform
    graph: plan-execute
    graph_config:
      max_replan_attempts: 2
    services_used:
      - service: edge-platform
        operations: [tunnel_list, tunnel_list_configs, tunnel_update_config, tunnel_delete, dns_list_zones, dns_list_records, dns_delete_record]
      - service: vault
        operations: [read, search, append]
    inputs:
      - key: hostname
        type: string
        label: Hostname to decommission
        description: "The public hostname to tear down"
        required: true
      - key: delete_tunnel
        type: boolean
        label: Delete tunnel entirely
        description: "Delete the tunnel if this is its only ingress rule"
        default: false
    trigger:
      on_demand: true
    prompt: |
      Decommission an edge service by removing its tunnel ingress and DNS records.
      This is a destructive operation — every step requires explicit human
      confirmation.

      Generate timestamps via agentic-timestamp --iso --date.

      Steps:
        1. Find the DNS record for config.hostname via
           {{edge-platform.dns_list_records}}. Identify the tunnel it points to.
        2. Read the tunnel's ingress config via
           {{edge-platform.tunnel_list_configs}}.
        3. Present the teardown plan:
           - DNS record to delete: {type} {hostname} → {content}
           - Ingress rule to remove: {hostname} → {origin}
           - Tunnel deletion: yes/no (based on config.delete_tunnel and
             whether other ingress rules remain)
        4. On approval, remove the ingress rule via
           {{edge-platform.tunnel_update_config}} (rebuild config without the
           hostname's rule).
        5. Delete the DNS record via {{edge-platform.dns_delete_record}}.
        6. If config.delete_tunnel and no other ingress rules remain, delete
           the tunnel via {{edge-platform.tunnel_delete}}.

      Update the vault service record at
      atlas/registers/infrastructure/tunnel-*-{hostname-slug}.md — append a
      decommission note with timestamp (do not delete the note — archive it).

      Present a summary of what was removed.

workflows:
  - name: edge-full-audit
    description: Comprehensive edge audit — tunnels, DNS, Workers, Pages, KV, D1, R2
    steps:
      - skill: tunnel-health
      - skill: dns-audit
      - skill: workers-audit
        after: [dns-audit]
      - skill: pages-audit
        after: [dns-audit]
      - skill: kv-inventory
        after: [workers-audit]
      - skill: d1-inventory
        after: [workers-audit]
      - skill: r2-audit
        after: [pages-audit]

  - name: service-standup
    description: Provision a new service with tunnel, DNS, and optional storage
    steps:
      - skill: edge-provision

  - name: service-decommission
    description: Tear down an edge service with full cleanup and health verification
    steps:
      - skill: edge-teardown
      - skill: tunnel-health
        after: [edge-teardown]

config:
  user_inputs:
    - key: default_tunnel
      type: string
      label: Default tunnel name
      required: false
      description: >-
        Name of the default Cloudflare Tunnel to use for tunnel-serve. If
        omitted, the first active tunnel is used.
    - key: primary_zone
      type: string
      label: Primary DNS zone
      required: false
      description: >-
        Primary domain for DNS operations (e.g. example.com). Used as default
        when hostname doesn't specify a zone.

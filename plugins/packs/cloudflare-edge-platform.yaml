readme:
  format: markdown
  body: |
    # Cloudflare Edge Platform Pack

    Full-stack Cloudflare infrastructure management for Sidereal — 14 skills
    across 8 service domains, backed by 53 MCP tools with read-free,
    write-gated safety on every destructive operation.

    ## What it does

    This pack treats Cloudflare as managed infrastructure for your Sidereal
    installation. It covers the complete lifecycle: provisioning, auditing,
    deploying, and decommissioning edge resources without opening the
    Cloudflare dashboard.

    ## Domain coverage

    | Domain | Tools | Capabilities |
    |--------|-------|-------------|
    | **DNS** | 10 | Zone listing, record CRUD, bulk operations, BIND export |
    | **Tunnels** | 7 | Create/delete tunnels, ingress routing, connection monitoring |
    | **Workers** | 10 | Script inventory, versioned deployments, secret management, cron triggers |
    | **Pages** | 7 | Project listing, deployment history, rollback, domain management, cache purge |
    | **KV** | 7 | Namespace inventory, key listing, read/write/bulk operations |
    | **D1** | 7 | Database inventory, schema inspection, read/write SQL, export |
    | **R2** | 4 | Bucket listing, details, creation, deletion |
    | **Cache** | 1 | Purge by URL, tag, host, prefix, or everything |

    ## Safety model

    All tools follow a **read-free, write-gated** pattern:

    - **Reads** work immediately — no confirmation needed
    - **Writes** require explicit `confirm: true` parameter
    - **Destructive operations** (delete, purge, rollback) are double-gated
    - Accidental deletions are structurally prevented by schema validation

    The pack's agent enforces human-in-the-loop for all infrastructure
    mutations. Every change is documented in vault service records with
    timestamps and resource IDs.

    ## Skills overview

    ### Infrastructure lifecycle
    - **tunnel-serve** — Expose a local service via existing tunnel (like `tailscale serve`)
    - **tunnel-funnel** — Create a new public endpoint with tunnel + DNS (like `tailscale funnel`)
    - **edge-provision** — One-command setup: tunnel + DNS + optional KV/D1/R2
    - **edge-teardown** — Decommission with full cleanup and documentation

    ### Auditing and inventory
    - **tunnel-health** — Monitor tunnel connectivity and ingress configuration
    - **dns-audit** — Find orphans, misconfigurations, and missing records
    - **kv-inventory** — Inventory KV namespaces with key counts and usage patterns
    - **d1-inventory** — Inventory D1 databases with schema snapshots
    - **workers-audit** — Audit Worker scripts, deployments, secrets, and cron schedules
    - **pages-audit** — Audit Pages projects, deployments, and custom domains
    - **r2-audit** — Inventory R2 buckets with location and storage class

    ### Deployment and operations
    - **workers-deploy** — Deploy a Worker version with percentage-based traffic routing
    - **pages-rollback** — Roll back a Pages project to a previous deployment
    - **cache-purge** — Targeted cache invalidation by URL, tag, host, or prefix

    ## Why this pack

    - **53 tools** across 8 Cloudflare domains — no dashboard needed
    - **Token efficient** — responses strip 60-80% of raw API payload by default
    - **Write-gated safety** — every mutation requires explicit confirmation
    - **Vault-documented** — every change creates a service record for audit trails
    - **One API token** — scoped Cloudflare token covers all operations

highlights:

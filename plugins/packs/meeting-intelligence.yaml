min_stallari: "0.38"

requires:
  services:
    - service: vault
      operations: [read, search, create, append, files, lens_fts]

recommends:
  services:
    - service: calendar
      operations: [events, today]
    - service: notifications
      operations: [send]

data:
  reads: [vault, calendar]
  writes: [vault]
  stores: nothing
  phones_home: false

agents:
  meeting-processor:
    role: operator
    prompt: |
      You are a meeting intelligence operator. You process audio recordings
      and transcripts into structured vault notes. You extract attendees,
      decisions, and action items, match participants to vault people cards
      via Lens search, and track commitments across meetings. You never send
      audio or transcript data to external services — all processing uses
      on-device tools.

skills:
  - name: transcribe-meeting
    agent: meeting-processor
    description: Watch for audio/transcript files and transcribe on-device via mlx-whisper
    tier: standard
    category: ingest
    graph: react-extract
    services_used:
      - service: vault
        operations: [read, create, files]
    trigger:
      watch:
        - "+/ingest/meetings/"
    outputs:
      - type: vault_note
        description: Transcript note saved to vault for downstream extraction
    prompt: |
      Watch the ingest folder +/ingest/meetings/ for new files. Handle two
      input types:

      **Audio files** (.mp3, .m4a, .wav, .webm):
      - Invoke the mlx-whisper MCP to transcribe on-device
      - Use the large-v3 model for best accuracy
      - Save the transcript as a vault note at
        atlas/notes/meetings/YYYY-MM-DD — {filename stem}.md
      - Include frontmatter: created, kind: transcript, source_file,
        duration (if available), llm_generated: true

      **Text files** (.txt, .md):
      - Read the file contents directly as the transcript
      - Save as a vault note with the same path convention
      - Include frontmatter: created, kind: transcript, source_file,
        llm_generated: true

      After saving, move the original file to +/ingest/meetings/processed/
      to prevent re-processing. Set notification_body with the filename and
      word count.

  - name: extract-minutes
    agent: meeting-processor
    description: Extract attendees, decisions, and action items from a transcript note
    tier: standard
    category: transform
    graph: react-extract
    services_used:
      - service: vault
        operations: [read, search, create, append, lens_fts]
    trigger:
      on_demand: true
    depends_on:
      - transcribe-meeting
    inputs:
      - key: transcript_path
        type: string
        label: Path to transcript note
        description: Vault-relative path to the transcript note to process
        required: true
    outputs:
      - type: vault_note
        description: Structured meeting minutes with attendees, decisions, and actions
    prompt: |
      Process the transcript note at {{input.transcript_path}} and extract
      structured meeting data.

      **Extraction targets:**
      1. **Attendees** — names mentioned or implied. For each attendee, run
         a Lens full-text search (vault_lens_fts) to match against vault
         people cards in atlas/people/. Include the wikilink if matched.
      2. **Decisions** — explicit agreements or conclusions reached. Quote
         the relevant passage.
      3. **Action items** — commitments with assignee (matched to attendee),
         description, and due date if mentioned. Format as checklist items.
      4. **Key discussion points** — major topics covered, summarised in
         2-3 sentences each.
      5. **Sentiment** — overall tone (productive/contentious/routine/urgent).

      **Output:** Create or update a meeting note at
      atlas/notes/meetings/YYYY-MM-DD — {meeting title} — minutes.md with:
      - Frontmatter: created, kind: meeting-minutes, attendees (array of
        names), decision_count, action_count, sentiment, transcript (wikilink
        to source), llm_generated: true
      - Body sections: ## Attendees, ## Decisions, ## Action Items,
        ## Discussion, ## Sentiment

      Link the minutes note back to the transcript note via the transcript
      frontmatter field. Set notification_body with attendee count and
      action item count.

  - name: weekly-commitments
    agent: meeting-processor
    description: Weekly digest of open action items by assignee with overdue flags
    tier: standard
    category: digest
    graph: react-extract
    services_used:
      - service: vault
        operations: [read, search, files, query_properties]
      - service: notifications
        operations: [send]
    trigger:
      schedule: "0 9 * * 1"
    outputs:
      - type: vault_note
        description: Weekly commitments digest grouped by assignee
      - type: notification
        description: Summary notification with overdue count
    prompt: |
      Generate a weekly commitments digest from all meeting minutes notes.

      **Process:**
      1. Search vault for notes with kind: meeting-minutes created in the
         last 14 days (query_properties where kind = meeting-minutes).
      2. Read each note and collect all unchecked action items (lines
         starting with "- [ ]").
      3. Parse assignee and due date from each action item.
      4. Group by assignee. Within each group, sort by due date.
      5. Flag items where due date is in the past as OVERDUE.
      6. Count: total open, overdue, by assignee.

      **Output:** Create a digest note at
      calendar/logs/digests/YYYY-MM-DD — weekly commitments.md with:
      - Frontmatter: created, kind: digest, digest_type: weekly-commitments,
        total_open, total_overdue, llm_generated: true
      - Body: ## Summary (counts), then ## {Assignee Name} sections with
        their action items, overdue items highlighted with a warning marker.

      Set notification_body: "{total_open} open commitments, {total_overdue}
      overdue" and notification_priority: 3.

  - name: process-meeting
    agent: meeting-processor
    description: On-demand full pipeline for a single audio file or transcript
    tier: standard
    category: ingest
    graph: react-extract
    services_used:
      - service: vault
        operations: [read, search, create, append, files, lens_fts]
    trigger:
      on_demand: true
    inputs:
      - key: file_path
        type: string
        label: Path to audio file or transcript
        description: >-
          Absolute path or vault-relative path to the audio file (.mp3, .m4a,
          .wav, .webm) or transcript (.txt, .md) to process.
        required: true
    outputs:
      - type: vault_note
        description: Transcript and structured meeting minutes
    prompt: |
      Process a single meeting file through the full pipeline. This is the
      ad-hoc equivalent of transcribe-meeting + extract-minutes combined.

      **Steps:**
      1. Read the file at {{input.file_path}}.
      2. If audio (.mp3, .m4a, .wav, .webm): invoke mlx-whisper MCP to
         transcribe on-device. If text (.txt, .md): use contents directly.
      3. Save transcript as vault note at
         atlas/notes/meetings/YYYY-MM-DD — {filename stem}.md with
         frontmatter: created, kind: transcript, source_file,
         llm_generated: true.
      4. Extract structured data from the transcript:
         - Attendees (Lens-matched to vault people cards)
         - Decisions (quoted passages)
         - Action items (assignee, description, due date as checklist)
         - Key discussion points (2-3 sentence summaries)
         - Sentiment (productive/contentious/routine/urgent)
      5. Create meeting minutes note at
         atlas/notes/meetings/YYYY-MM-DD — {meeting title} — minutes.md
         with full frontmatter and structured body sections.
      6. Move original file to +/ingest/meetings/processed/.

      Set notification_body with the meeting title, attendee count, and
      action item count.

pack: "1.6"
name: meeting-intelligence
title: "Meeting Intelligence"
featured: false
version: "1.0.0"
author_type: community
readiness: experimental
description: >-
  Privacy-first meeting processing — on-device transcription via mlx-whisper,
  attendee extraction matched to vault people cards, action item tracking, and
  weekly commitments digest. Audio never leaves your machine.
icon: /icons/meeting-intelligence.svg
author:
  name: digitalassistants-au
  url: https://github.com/digitalassistants-au
licence: MIT
visibility: open
tier: community
pricing: null
tagline: "On-device transcription, attendee matching, and action tracking — meetings that feed your vault"

readme:
  format: markdown
  body: |
    # Meeting Intelligence Pack

    Privacy-first meeting processing for Stallari. Drop audio files or
    transcripts into a watched folder and let the pipeline handle the rest —
    transcription stays on-device via mlx-whisper, so your audio never leaves
    your machine.

    ## What it does

    A single **meeting-processor** agent runs four skills that form a pipeline
    from raw audio to structured vault notes and weekly accountability digests.

    ## Skills

    1. **Transcribe meeting** watches `+/ingest/meetings/` for audio files
       (.mp3, .m4a, .wav, .webm) or plain-text transcripts (.txt, .md). Audio
       is transcribed on-device using the mlx-whisper MCP — no cloud API, no
       data egress. The transcript is saved as a vault note and queued for
       extraction.
    2. **Extract minutes** takes a transcript note and extracts structured
       meeting data: attendees, decisions, action items with assignees and
       due dates, key discussion points, and overall sentiment. Attendees
       are matched to vault people cards via Lens full-text search.
    3. **Weekly commitments** runs on a schedule and aggregates all open
       action items across recent meeting notes, grouped by assignee. Flags
       overdue items and produces a digest note for review.
    4. **Process meeting** is an on-demand skill that runs the full pipeline
       (transcribe + extract) for a single named file, useful for ad-hoc
       processing outside the watch trigger.

    ## Privacy model

    - Audio transcription is **entirely on-device** via mlx-whisper (MLX
      backend, Apple Silicon optimised)
    - No audio data is sent to any cloud API
    - Transcripts and meeting notes live in your vault — nothing is stored
      externally
    - The pack phones home to **zero** external services

    ## Requirements

    - **mlx-whisper MCP** must be installed separately (Python, via `uv`).
      This is the on-device transcription backend. A future version may
      support WhisperKit (native Swift) when dependency conflicts resolve.
    - Vault service with read/write access
    - Calendar service recommended for correlating meetings with events

    ## Future plans

    - Speaker diarisation via pyannote.audio (on-device)
    - Board minutes mode with sequential resolution numbering (RES-YYYY-NNN)
    - ATO-defensible compliance critique-refine loop (quorum checks,
      financials review, COI disclosure)

